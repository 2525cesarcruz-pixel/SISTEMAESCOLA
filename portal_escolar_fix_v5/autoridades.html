<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autoridades Assinantes — E.M. Getúlio Vargas</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="institucional.css">
  <style>
    :root { --azul:#1565C0; --azul2:#0D47A1; --borda:#DDE3EC; --cinza:#F0F4F9; --texto:#0F1923; --sub:#5A6880; --erro:#C62828; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--cinza); color: var(--texto); min-height: 100vh; padding-bottom: 40px; }
    .page-header { background: linear-gradient(135deg, var(--azul), var(--azul2)); color: #fff; padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .page-header h1 { font-size: 1.1rem; font-weight: 800; }
    .page-header p { font-size: .8rem; opacity: .9; margin-top: 2px; }
    .btn { border: none; border-radius: 10px; padding: 10px 18px; font-size: .85rem; font-weight: 700; cursor: pointer; font-family: inherit; transition: .2s; }
    .btn-sec { background: rgba(255,255,255,.2); color: #fff; border: 1px solid rgba(255,255,255,.4); }
    .btn-sec:hover { background: rgba(255,255,255,.3); }
    .conteudo { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
    .card { background: #fff; border-radius: 14px; box-shadow: 0 2px 16px rgba(0,0,0,.06); border: 1px solid var(--borda); margin-bottom: 20px; overflow: hidden; }
    .card-head { background: #E3F2FD; padding: 14px 20px; font-weight: 700; font-size: .95rem; color: var(--azul2); }
    .card-body { padding: 20px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
    .campo { margin-bottom: 14px; }
    .campo label { display: block; font-size: .72rem; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
    .campo input, .campo select, .campo textarea { width: 100%; padding: 10px 12px; border: 1.5px solid var(--borda); border-radius: 8px; font-size: .9rem; font-family: inherit; }
    .campo input:focus, .campo textarea:focus { outline: none; border-color: var(--azul); }
    .btn-salvar { background: var(--azul); color: #fff; }
    .btn-salvar:hover { background: var(--azul2); }
    .preview-assinatura { margin-top: 16px; padding: 16px; border: 1px dashed var(--borda); border-radius: 10px; background: #FAFBFC; }
    .preview-assinatura h4 { font-size: .8rem; color: var(--sub); margin-bottom: 10px; }
    .preview-box { display: inline-block; text-align: center; padding: 12px; }
    .preview-box .doc-assinatura-img { max-height: 40px; max-width: 140px; }
    .preview-box .doc-assinatura-nome { font-size: 11px; font-weight: 700; }
    .preview-box .doc-assinatura-carimbo { font-size: 10px; color: var(--sub); }
    .upload-area { border: 2px dashed var(--borda); border-radius: 10px; padding: 20px; text-align: center; margin-top: 10px; cursor: pointer; transition: .2s; }
    .upload-area:hover { border-color: var(--azul); background: #F5F9FF; }
    .upload-area input[type=file] { display: none; }
    .msg { padding: 10px 14px; border-radius: 8px; margin-bottom: 12px; font-size: .85rem; }
    .msg.erro { background: #FFEBEE; color: var(--erro); }
    .msg.ok { background: #E8F5E9; color: #1B5E20; }
    .ativo-wrap { display: flex; align-items: center; gap: 8px; }
    .ativo-wrap input { width: auto; }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-auth.js"></script>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>
  <script>
    (async function(){
      const u = await (window.PortalAuth && PortalAuth.requireLogin ? PortalAuth.requireLogin(['diretor', 'secretaria']) : Promise.resolve(null));
      if (!u) return;
    })();
  </script>

  <div class="page-header">
    <div>
      <h1>👤 Autoridades Assinantes</h1>
      <p>E.M. Getúlio Vargas — Nova Ubiratã/MT · Cadastro e assinatura digital (PNG)</p>
    </div>
    <button class="btn btn-sec" onclick="window.location.href='index.html'">🏠 Voltar ao Portal</button>
  </div>

  <div class="conteudo">
    <div id="msg" class="msg" style="display:none"></div>
    <div id="lista-autoridades"></div>
  </div>

  <script>
    const BUCKET = 'assinaturas-oficiais';
    const CARGOS = [
      { id: 'diretora', label: 'Diretora' },
      { id: 'secretario', label: 'Secretário(a)' },
      { id: 'coordenadora', label: 'Coordenadora' }
    ];

    function showMsg(text, isError) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + (isError ? 'erro' : 'ok');
      el.style.display = 'block';
      setTimeout(function(){ el.style.display = 'none'; }, 5000);
    }

    async function listarAutoridades() {
      try {
        const rows = await window.supaFetch('/rest/v1/autoridades_assinantes?select=*&order=cargo.asc');
        const map = (Array.isArray(rows) ? rows : []).reduce(function(acc, r) { acc[r.cargo] = r; return acc; }, {});
        const area = document.getElementById('lista-autoridades');
        area.textContent = '';

        for (let i = 0; i < CARGOS.length; i++) {
          const c = CARGOS[i];
          const aut = map[c.id] || null;

          const card = document.createElement('div');
          card.className = 'card';

          const head = document.createElement('div');
          head.className = 'card-head';
          head.textContent = c.label;

          const body = document.createElement('div');
          body.className = 'card-body';

          const formAut = document.createElement('div');
          formAut.className = 'form-aut';

          const previewSec = document.createElement('div');
          previewSec.className = 'preview-assinatura';

          const h4 = document.createElement('h4');
          h4.textContent = 'Prévia no documento';

          const previewInner = document.createElement('div');
          previewInner.className = 'preview-box-inner';

          previewSec.appendChild(h4);
          previewSec.appendChild(previewInner);

          body.appendChild(formAut);
          body.appendChild(previewSec);
          card.appendChild(head);
          card.appendChild(body);

          const inpNome = document.createElement('input');
          inpNome.type = 'text';
          inpNome.className = 'inp-nome';
          inpNome.placeholder = 'Nome da autoridade';
          if (aut && aut.nome) inpNome.value = aut.nome;

          const divNome = document.createElement('div');
          divNome.className = 'campo';
          const lblNome = document.createElement('label');
          lblNome.textContent = 'Nome completo';
          divNome.appendChild(lblNome);
          divNome.appendChild(inpNome);
          formAut.appendChild(divNome);

          const ativoWrap = document.createElement('div');
          ativoWrap.className = 'ativo-wrap';

          const inpAtivo = document.createElement('input');
          inpAtivo.type = 'checkbox';
          inpAtivo.className = 'inp-ativo';
          inpAtivo.checked = !aut || aut.ativo !== false;

          const spanAtivo = document.createElement('span');
          spanAtivo.textContent = 'Autoridade ativa para este cargo';

          ativoWrap.appendChild(inpAtivo);
          ativoWrap.appendChild(spanAtivo);

          const divAtivo = document.createElement('div');
          divAtivo.className = 'campo';
          const lblAtivo = document.createElement('label');
          lblAtivo.textContent = 'Ativo';
          divAtivo.appendChild(lblAtivo);
          divAtivo.appendChild(ativoWrap);
          formAut.appendChild(divAtivo);

          const inpCarimbo1 = document.createElement('input');
          inpCarimbo1.type = 'text';
          inpCarimbo1.className = 'inp-carimbo1';
          inpCarimbo1.placeholder = 'Ex: E.M. Getúlio Vargas';
          if (aut && aut.carimbo_linha1) inpCarimbo1.value = aut.carimbo_linha1;

          const divC1 = document.createElement('div');
          divC1.className = 'campo';
          const lblC1 = document.createElement('label');
          lblC1.textContent = 'Carimbo linha 1';
          divC1.appendChild(lblC1);
          divC1.appendChild(inpCarimbo1);
          formAut.appendChild(divC1);

          const inpCarimbo2 = document.createElement('input');
          inpCarimbo2.type = 'text';
          inpCarimbo2.className = 'inp-carimbo2';
          inpCarimbo2.placeholder = 'Ex: Nova Ubiratã/MT';
          if (aut && aut.carimbo_linha2) inpCarimbo2.value = aut.carimbo_linha2;

          const divC2 = document.createElement('div');
          divC2.className = 'campo';
          const lblC2 = document.createElement('label');
          lblC2.textContent = 'Carimbo linha 2';
          divC2.appendChild(lblC2);
          divC2.appendChild(inpCarimbo2);
          formAut.appendChild(divC2);

          const inpCarimbo3 = document.createElement('input');
          inpCarimbo3.type = 'text';
          inpCarimbo3.className = 'inp-carimbo3';
          if (aut && aut.carimbo_linha3) inpCarimbo3.value = aut.carimbo_linha3;

          const divC3 = document.createElement('div');
          divC3.className = 'campo';
          const lblC3 = document.createElement('label');
          lblC3.textContent = 'Carimbo linha 3';
          divC3.appendChild(lblC3);
          divC3.appendChild(inpCarimbo3);
          formAut.appendChild(divC3);

          const pathAtual = (aut && aut.assinatura_png_path) ? aut.assinatura_png_path : '';

          const uploadArea = document.createElement('div');
          uploadArea.className = 'upload-area';
          uploadArea.dataset.cargo = c.id;

          const uploadText = document.createElement('span');
          uploadText.className = 'upload-text';
          uploadText.textContent = pathAtual ? 'Alterar arquivo PNG' : 'Clique para enviar PNG';

          const inpFile = document.createElement('input');
          inpFile.type = 'file';
          inpFile.accept = 'image/png';
          inpFile.className = 'inp-file';

          uploadArea.appendChild(uploadText);
          uploadArea.appendChild(inpFile);

          const divUpload = document.createElement('div');
          divUpload.className = 'campo';

          const lblUpload = document.createElement('label');
          lblUpload.textContent = 'Assinatura digital (PNG)';

          divUpload.appendChild(lblUpload);
          divUpload.appendChild(uploadArea);

          if (pathAtual) {
            const pPath = document.createElement('p');
            pPath.style.cssText = 'font-size:.75rem;color:var(--sub);margin-top:6px;';
            pPath.textContent = 'Arquivo atual: ' + pathAtual;
            divUpload.appendChild(pPath);
          }

          formAut.appendChild(divUpload);

          const btnSalvar = document.createElement('button');
          btnSalvar.className = 'btn btn-salvar';
          btnSalvar.textContent = 'Salvar';
          btnSalvar.onclick = function() { salvarAutoridade(c.id, card); };
          formAut.appendChild(btnSalvar);

          function updatePreview() {
            const nome = (card.querySelector('.inp-nome').value || '').trim();
            const c1 = (card.querySelector('.inp-carimbo1').value || '').trim();
            const c2 = (card.querySelector('.inp-carimbo2').value || '').trim();
            const c3 = (card.querySelector('.inp-carimbo3').value || '').trim();
            const carimbo = [c1, c2, c3].filter(Boolean).join(' — ');

            while (previewInner.firstChild) previewInner.removeChild(previewInner.firstChild);

            const box = document.createElement('div');
            box.className = 'preview-box';

            if (pathAtual || card._previewDataUrl) {
              const img = document.createElement('img');
              img.className = 'doc-assinatura-img preview-img';
              img.alt = 'Assinatura';

              if (card._previewDataUrl) {
                img.src = card._previewDataUrl;
              } else if (pathAtual) {
                getSignedUrl(pathAtual).then(function(url) { img.src = url; }).catch(function() {});
              }
              box.appendChild(img);
            }

            const nomeD = document.createElement('div');
            nomeD.className = 'doc-assinatura-nome';
            nomeD.textContent = nome || 'Nome da autoridade';
            box.appendChild(nomeD);

            const carimboD = document.createElement('div');
            carimboD.className = 'doc-assinatura-carimbo';
            carimboD.textContent = carimbo || 'Carimbo';
            box.appendChild(carimboD);

            previewInner.appendChild(box);
          }

          card.querySelector('.inp-nome').oninput = updatePreview;
          card.querySelector('.inp-carimbo1').oninput = updatePreview;
          card.querySelector('.inp-carimbo2').oninput = updatePreview;
          card.querySelector('.inp-carimbo3').oninput = updatePreview;

          // ✅ Correção: usar as variáveis já criadas (sem redeclarar) + sem uploadWrap inexistente
          uploadArea.onclick = function() { inpFile.click(); };
          inpFile.onchange = function() {
            const f = inpFile.files[0];
            if (!f || f.type !== 'image/png') { showMsg('Selecione um arquivo PNG.', true); return; }

            const reader = new FileReader();
            reader.onload = function() { card._previewDataUrl = reader.result; updatePreview(); };
            reader.readAsDataURL(f);

            uploadArea.querySelector('.upload-text').textContent = f.name;
            card._filePending = f;
            updatePreview();
          };

          card.dataset.cargo = c.id;
          card._aut = aut;
          card._pathAtual = pathAtual;
          updatePreview();
          area.appendChild(card);
        }
      } catch (e) {
        console.error(e);
        showMsg('Erro ao carregar autoridades: ' + (e.message || ''), true);
      }
    }

    async function getSignedUrl(path) {
      const client = window.SupabaseAuth && window.SupabaseAuth.getClient ? window.SupabaseAuth.getClient() : null;
      if (!client || !client.storage) return '';
      const { data } = await client.storage.from(BUCKET).createSignedUrl(path, 3600);
      return (data && data.signedUrl) ? data.signedUrl : '';
    }

    async function salvarAutoridade(cargo, card) {
      const nome = (card.querySelector('.inp-nome').value || '').trim();
      if (!nome) { showMsg('Preencha o nome da autoridade.', true); return; }

      const ativo = card.querySelector('.inp-ativo').checked;
      const carimbo_linha1 = (card.querySelector('.inp-carimbo1').value || '').trim() || null;
      const carimbo_linha2 = (card.querySelector('.inp-carimbo2').value || '').trim() || null;
      const carimbo_linha3 = (card.querySelector('.inp-carimbo3').value || '').trim() || null;
      let assinatura_png_path = card._pathAtual || null;

      const file = card._filePending;
      if (file) {
        try {
          const client = window.SupabaseAuth && window.SupabaseAuth.getClient ? window.SupabaseAuth.getClient() : null;
          if (!client || !client.storage) { showMsg('Storage não disponível.', true); return; }

          const path = cargo + '_' + Date.now() + '.png';
          await client.storage.from(BUCKET).upload(path, file, { contentType: 'image/png', upsert: true });

          assinatura_png_path = path;
          card._pathAtual = path;
          card._filePending = null;
        } catch (e) {
          showMsg('Erro ao enviar PNG: ' + (e.message || ''), true);
          return;
        }
      }

      const payload = {
        cargo,
        nome,
        ativo,
        carimbo_linha1,
        carimbo_linha2,
        carimbo_linha3,
        assinatura_png_path,
        assinatura_mime: assinatura_png_path ? 'image/png' : null,
        assinatura_updated_em: assinatura_png_path ? new Date().toISOString() : null
      };

      try {
        if (card._aut && card._aut.id) {
          await window.supaFetch('/rest/v1/autoridades_assinantes?id=eq.' + card._aut.id, {
            method: 'PATCH',
            body: JSON.stringify(payload)
          });
        } else {
          await window.supaFetch('/rest/v1/autoridades_assinantes', {
            method: 'POST',
            prefer: 'return=representation',
            body: JSON.stringify(payload)
          });
        }

        showMsg('Autoridade salva com sucesso.');
        listarAutoridades();
      } catch (e) {
        showMsg('Erro ao salvar: ' + (e.message || ''), true);
      }
    }

    document.addEventListener('DOMContentLoaded', listarAutoridades);
  </script>
</body>
</html>
