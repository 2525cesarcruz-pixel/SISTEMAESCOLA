<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório de Matrículas — E. M. Getúlio Vargas</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="institucional.css">
<style>
:root{
  --azul:#1565C0; --azul2:#0D47A1; --azul3:#1976D2; --azul4:#DBEEFF;
  --verde:#1B5E20; --verde2:#2E7D32; --verde4:#E8F5E9;
  --ouro:#F57F17; --ouro2:#FFF8E1;
  --roxo:#6A1B9A; --roxo2:#EDE7F6;
  --sub:#5A6880; --borda:#DDE3EC; --cinza:#F0F4F9; --texto:#0F1923;
  --sombra:0 4px 24px rgba(21,101,192,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--cinza);color:var(--texto);min-height:100vh}

/* HEADER */
.page-header{background:linear-gradient(135deg,var(--azul),var(--azul2));padding:20px 28px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.page-header h1{color:#fff;font-size:1.1rem;font-weight:800}
.page-header p{color:rgba(255,255,255,.75);font-size:.78rem;margin-top:2px}
.header-btns{display:flex;gap:10px;flex-wrap:wrap}
.btn{border:none;border-radius:10px;padding:10px 20px;font-size:.82rem;font-weight:700;
  cursor:pointer;transition:.2s;font-family:'Plus Jakarta Sans',sans-serif}
.btn-branco{background:#fff;color:var(--azul)}
.btn-branco:hover{background:#e8f0fe}
.btn-verde{background:var(--verde2);color:#fff}
.btn-verde:hover{background:var(--verde)}
.btn-sec{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)}
.btn-sec:hover{background:rgba(255,255,255,.25)}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* FILTROS */
.filtros-bar{background:#fff;border-bottom:1.5px solid var(--borda);padding:14px 28px;
  display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.filtros-bar label{font-size:.75rem;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.05em}
.filtros-bar select,.filtros-bar input{border:1.5px solid var(--borda);border-radius:8px;
  padding:8px 12px;font-size:.85rem;font-family:inherit;background:#fff;color:var(--texto)}
.filtros-bar select:focus,.filtros-bar input:focus{outline:none;border-color:var(--azul3)}
.filtros-bar .sep{width:1px;height:28px;background:var(--borda);flex-shrink:0}

/* CONTEÚDO */
.conteudo{padding:24px 28px;max-width:1200px;margin:0 auto}

/* CARDS DE TOTAIS */
.totais-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:28px}
.total-card{background:#fff;border-radius:14px;padding:16px 18px;box-shadow:var(--sombra);
  border-top:4px solid var(--azul);text-align:center}
.total-card.verde{border-top-color:var(--verde2)}
.total-card.ouro{border-top-color:var(--ouro)}
.total-card.roxo{border-top-color:var(--roxo)}
.total-card .num{font-size:2rem;font-weight:800;color:var(--azul);line-height:1}
.total-card.verde .num{color:var(--verde2)}
.total-card.ouro .num{color:var(--ouro)}
.total-card.roxo .num{color:var(--roxo)}
.total-card .label{font-size:.72rem;font-weight:700;color:var(--sub);text-transform:uppercase;
  letter-spacing:.05em;margin-top:6px}

/* SEÇÃO DE TURMA */
.turma-sec{background:#fff;border-radius:16px;box-shadow:var(--sombra);margin-bottom:20px;overflow:hidden}
.turma-header{background:linear-gradient(135deg,var(--azul),var(--azul3));padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.turma-header h3{color:#fff;font-size:.95rem;font-weight:800}
.turma-badges{display:flex;gap:8px;flex-wrap:wrap}
.tbadge{background:rgba(255,255,255,.2);color:#fff;border-radius:99px;
  padding:3px 12px;font-size:.72rem;font-weight:700}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--azul4)}
thead th{padding:10px 14px;font-size:.72rem;font-weight:700;color:var(--azul2);
  text-transform:uppercase;letter-spacing:.05em;text-align:left;border-bottom:2px solid var(--borda)}
tbody tr{border-bottom:1px solid var(--borda);transition:.15s}
tbody tr:hover{background:#f7faff}
tbody tr:last-child{border-bottom:none}
td{padding:10px 14px;font-size:.83rem}
td.nchamada{font-weight:800;color:var(--azul);text-align:center;width:48px}
td.nome{font-weight:600}
td.sub{color:var(--sub)}
.badge{display:inline-block;border-radius:99px;padding:2px 9px;font-size:.68rem;font-weight:700}
.badge-mat{background:var(--azul4);color:var(--azul2)}
.badge-rema{background:var(--verde4);color:var(--verde2)}
.badge-m{background:#FEE2E2;color:#991B1B}
.badge-f{background:#FCE7F3;color:#9D174D}
.badge-nee{background:#FEF3C7;color:#92400E}

/* SUBTOTAIS */
.subtotal-row{background:var(--azul4)!important}
.subtotal-row td{font-weight:700;font-size:.8rem;color:var(--azul2);padding:8px 14px}

/* RODAPÉ DE TURMA */
.turma-footer{padding:10px 20px;background:var(--cinza);display:flex;gap:16px;flex-wrap:wrap}
.tf-item{font-size:.75rem;color:var(--sub);font-weight:600}
.tf-item b{color:var(--texto)}

/* LOADING */
#loading{text-align:center;padding:60px 20px}
.spinner{width:44px;height:44px;border:4px solid var(--borda);border-top-color:var(--azul);
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* VAZIO */
.vazio{text-align:center;padding:40px 20px;color:var(--sub)}
.vazio span{font-size:2.5rem;display:block;margin-bottom:8px}

/* IMPRESSÃO */
@media print{
  .page-header .header-btns,.filtros-bar{display:none!important}
  body{background:#fff}
  .turma-sec{box-shadow:none;border:1.5px solid #ccc;break-inside:avoid}
  .conteudo{padding:0}
  .total-card{box-shadow:none;border:1px solid #ccc}
}
@media(max-width:600px){
  .conteudo{padding:16px}
  .totais-grid{grid-template-columns:1fr 1fr}
  td.sub,td:nth-child(5),td:nth-child(6){display:none}
}
</style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase-auth.js"></script>
<script src="supabase-config.js"></script>
<script src="auth.js"></script>
<script src="institucional.js"></script>
<script>
  (async function(){
    if (window.PortalAuth && PortalAuth.requireLogin) {
      const u = await PortalAuth.requireLogin(['diretor','secretaria','coordenacao','professor']);
      if (!u) return;
    }
  })();
</script>

<!-- HEADER -->
<div class="page-header">
  <div>
    <h1>📊 Relatório de Matrículas por Turma</h1>
    <p>E. M. Getúlio Vargas — Nova Ubiratã/MT · <span id="data-geracao"></span></p>
  </div>
  <div class="header-btns">
    <button class="btn btn-sec" onclick="window.location.href='index.html'">🏠 Voltar</button>
    <button class="btn btn-branco" id="btn-pdf" onclick="gerarPDF()" disabled>⬇ Baixar PDF</button>
    <button class="btn btn-verde" id="btn-imprimir" onclick="imprimirRelatorioMatriculas()" disabled>🖨 Imprimir</button>
  </div>
</div>

<!-- FILTROS -->
<div class="filtros-bar">
  <label>Ano Letivo</label>
  <select id="fil-ano" onchange="aplicarFiltros()">
    <option value="">Todos</option>
    <option value="2026" selected>2026</option>
    <option value="2025">2025</option>
  </select>

  <div class="sep"></div>
  <label>Turno</label>
  <select id="fil-turno" onchange="aplicarFiltros()">
    <option value="">Todos</option>
    <option>Matutino</option>
    <option>Vespertino</option>
    <option>Noturno</option>
    <option>Integral</option>
  </select>

  <div class="sep"></div>
  <label>Etapa</label>
  <select id="fil-etapa" onchange="aplicarFiltros()">
    <option value="">Todas</option>
  </select>

  <div class="sep"></div>
  <label>Turma</label>
  <select id="fil-turma" onchange="aplicarFiltros()">
    <option value="">Todas</option>
  </select>

  <div class="sep"></div>
  <label>Sexo</label>
  <select id="fil-sexo" onchange="aplicarFiltros()">
    <option value="">Todos</option>
    <option value="M">M</option>
    <option value="F">F</option>
    <option value="NI">Não informado</option>
  </select>

  <div class="sep"></div>
  <label>NEE</label>
  <select id="fil-nee" onchange="aplicarFiltros()">
    <option value="">Todos</option>
    <option value="Sim">Sim</option>
    <option value="Nao">Não</option>
  </select>

  <div class="sep"></div>
  <label>Restrição alimentar</label>
  <select id="fil-restricao" onchange="aplicarFiltros()">
    <option value="">Todos</option>
    <option value="Sim">Sim</option>
    <option value="Nao">Não</option>
  </select>

  <div class="sep"></div>
  <label>Idade min</label>
  <input type="number" id="fil-idade-min" placeholder="0" min="0" max="99" style="width:60px" onchange="aplicarFiltros()">

  <div class="sep"></div>
  <label>Idade max</label>
  <input type="number" id="fil-idade-max" placeholder="99" min="0" max="99" style="width:60px" onchange="aplicarFiltros()">

  <div class="sep"></div>
  <label>Nome</label>
  <input type="text" id="fil-nome" placeholder="Busca por nome..." style="min-width:140px" oninput="debouncedAplicarFiltros()">

  <div class="sep"></div>
  <label>Ordenar alunos por</label>
  <select id="fil-ordem" onchange="aplicarFiltros()">
    <option value="chamada">Nº Chamada</option>
    <option value="nome">Nome (A-Z)</option>
  </select>
</div>

<!-- CONTEÚDO -->
<div class="conteudo">

  <!-- Loading -->
  <div id="loading">
    <div class="spinner"></div>
    <p style="color:var(--sub);font-size:.88rem;font-weight:600">Carregando matrículas...</p>
  </div>

  <!-- Totais gerais -->
  <div id="area-totais" style="display:none">
    <div class="totais-grid" id="totais-grid"></div>
  </div>

  <!-- Tabelas por turma -->
  <div id="area-relatorio" style="display:none"></div>

</div>

<!-- Container para impressão (padrão municipal): apenas #doc é impresso -->
<div id="doc" class="doc doc--landscape" style="display:none"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="supabase-config.js"></script>
<script>
// Usando lerTabelaGenerica/supaFetch do supabase-config.js
let todasMatriculas = [];
let matriculasFiltradas = [];

const lerMatriculas = () => lerTabelaGenerica('matriculas');

// ── Compatibilidade de schema (nomes comuns de campos) ──────────────────────
function getNascimento(a) { return a.data_nascimento || a.nascimento || a.dataNasc || ''; }
function getSexo(a) {
  const v = (a.sexo || a.genero || '').toString().trim().toUpperCase().slice(0, 1);
  return (v === 'M' || v === 'F') ? v : '';
}
function getNEE(a) {
  const v = (a.nee || a.necessidades_especiais || a.temNEE || '').toString().trim();
  return v === 'Sim' ? 'Sim' : (v === 'Não' || v === 'Nao') ? 'Nao' : '';
}
function getRestricao(a) {
  const v = (a.restricao_alimentar || a.alergias || a.restricaoAlimentar || '').toString().trim();
  return v === 'Sim' ? 'Sim' : (v === 'Não' || v === 'Nao') ? 'Nao' : '';
}
function getTurma(a) { return (a.turma || a.turma_nome || a.serie_turma || '').toString().trim(); }
function getNome(a) { return (a.nome || '').toString().trim(); }

// Idade em anos a partir da data de nascimento (referência: hoje, considerando dia/mês)
function calcularIdade(dataNascStr, dataRef) {
  if (!dataNascStr || typeof dataNascStr !== 'string') return null;
  const ref = dataRef || new Date();
  const s = dataNascStr.trim();
  let dia, mes, ano;
  const slash = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  const dash = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (slash) {
    dia = parseInt(slash[1], 10);
    mes = parseInt(slash[2], 10) - 1;
    ano = parseInt(slash[3], 10);
  } else if (dash) {
    dia = parseInt(dash[3], 10);
    mes = parseInt(dash[2], 10) - 1;
    ano = parseInt(dash[1], 10);
  } else return null;
  if (isNaN(dia) || isNaN(mes) || isNaN(ano) || mes < 0 || mes > 11) return null;
  const nasc = new Date(ano, mes, dia);
  let idade = ref.getFullYear() - nasc.getFullYear();
  const mDiff = ref.getMonth() - nasc.getMonth();
  if (mDiff < 0 || (mDiff === 0 && ref.getDate() < nasc.getDate())) idade--;
  return idade >= 0 && idade <= 120 ? idade : null;
}

// Debounce para filtro de texto
let _debounceTimer = null;
function debouncedAplicarFiltros() {
  if (_debounceTimer) clearTimeout(_debounceTimer);
  _debounceTimer = setTimeout(aplicarFiltros, 300);
}

// Paginação no client quando > 3000 registros (performance)
const PAGINA_TAMANHO = 500;
const LIMITE_PAGINACAO = 3000;
let paginaAtual = 1;

// ── INIT ──────────────────────────────────────────────────────────────────
document.getElementById('data-geracao').textContent =
  new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});

(async function init(){
  try {
    todasMatriculas = await lerMatriculas();
    popularFiltros();
    aplicarFiltros();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('area-totais').style.display = '';
    document.getElementById('area-relatorio').style.display = '';
    document.getElementById('btn-pdf').disabled = false;
    document.getElementById('btn-imprimir').disabled = false;
  } catch(e){
    const load = document.getElementById('loading');
    load.textContent = '';
    const span = document.createElement('span'); span.style.fontSize = '2.5rem'; span.textContent = '⚠️'; load.appendChild(span);
    const p1 = document.createElement('p'); p1.style.cssText = 'color:#C62828;font-weight:700;margin-top:8px'; p1.textContent = 'Erro ao carregar dados'; load.appendChild(p1);
    const p2 = document.createElement('p'); p2.style.cssText = 'color:var(--sub);font-size:.8rem;margin-top:4px'; p2.textContent = (e && e.message) || String(e); load.appendChild(p2);
    const btn = document.createElement('button'); btn.className = 'btn btn-branco'; btn.style.cssText = 'margin-top:16px;background:var(--azul);color:#fff'; btn.textContent = '🔄 Tentar Novamente'; btn.onclick = () => location.reload(); load.appendChild(btn);
  }
})();

// ── FILTROS ───────────────────────────────────────────────────────────────
function popularFiltros(){
  const etapas = [...new Set(todasMatriculas.map(m => m.etapa).filter(Boolean))].sort();
  const turmas = [...new Set(todasMatriculas.map(m => getTurma(m)).filter(Boolean))].sort();

  const selEtapa = document.getElementById('fil-etapa');
  etapas.forEach(e => { const o = document.createElement('option'); o.value = o.textContent = e; selEtapa.appendChild(o); });

  const selTurma = document.getElementById('fil-turma');
  turmas.forEach(t => { const o = document.createElement('option'); o.value = o.textContent = t; selTurma.appendChild(o); });
}

function aplicarFiltros(){
  const ano       = document.getElementById('fil-ano').value;
  const turno     = document.getElementById('fil-turno').value;
  const etapa     = document.getElementById('fil-etapa').value;
  const turma     = document.getElementById('fil-turma').value;
  const sexo      = document.getElementById('fil-sexo').value;
  const nee       = document.getElementById('fil-nee').value;
  const restricao = document.getElementById('fil-restricao').value;
  const idadeMin  = document.getElementById('fil-idade-min').value;
  const idadeMax  = document.getElementById('fil-idade-max').value;
  const nome      = (document.getElementById('fil-nome').value || '').trim().toLowerCase();
  const ordem     = document.getElementById('fil-ordem').value;

  matriculasFiltradas = todasMatriculas.filter(m => {
    if (ano && !(m.anoLetivo||'').includes(ano)) return false;
    if (turno && m.turno !== turno) return false;
    if (etapa && m.etapa !== etapa) return false;
    if (turma && getTurma(m) !== turma) return false;

    const s = getSexo(m);
    if (sexo === 'M' && s !== 'M') return false;
    if (sexo === 'F' && s !== 'F') return false;
    if (sexo === 'NI' && s !== '') return false;

    const n = getNEE(m);
    if (nee === 'Sim' && n !== 'Sim') return false;
    if (nee === 'Nao' && n !== 'Nao') return false;

    const r = getRestricao(m);
    if (restricao === 'Sim' && r !== 'Sim') return false;
    if (restricao === 'Nao' && r !== 'Nao') return false;

    const idade = calcularIdade(getNascimento(m));
    if (idadeMin !== '' && (idade === null || idade < parseInt(idadeMin, 10))) return false;
    if (idadeMax !== '' && (idade === null || idade > parseInt(idadeMax, 10))) return false;

    if (nome && !getNome(m).toLowerCase().includes(nome)) return false;

    return true;
  });

  if (ordem === 'nome') {
    matriculasFiltradas.sort((a,b) => getNome(a).localeCompare(getNome(b), 'pt-BR'));
  } else {
    matriculasFiltradas.sort((a,b) => {
      const na = parseInt(a.nChamada, 10) || 999, nb = parseInt(b.nChamada, 10) || 999;
      if (na !== nb) return na - nb;
      return getNome(a).localeCompare(getNome(b), 'pt-BR');
    });
  }

  paginaAtual = 1;
  renderTotais();
  renderRelatorio();
}

// ── INDICADORES (cards) — números seguros (contagens), não dados do banco ───
function renderTotais(){
  const total    = matriculasFiltradas.length;
  const masc     = matriculasFiltradas.filter(m => getSexo(m) === 'M').length;
  const fem      = matriculasFiltradas.filter(m => getSexo(m) === 'F').length;
  const nee      = matriculasFiltradas.filter(m => getNEE(m) === 'Sim').length;
  const restric  = matriculasFiltradas.filter(m => getRestricao(m) === 'Sim').length;
  const inicial  = matriculasFiltradas.filter(m => m.tipoMatricula==='Inicial').length;
  const rematric = matriculasFiltradas.filter(m => m.tipoMatricula==='Rematricula').length;
  const turmas   = new Set(matriculasFiltradas.map(m => getTurma(m)).filter(Boolean)).size;
  const etapas   = new Set(matriculasFiltradas.map(m => m.etapa).filter(Boolean)).size;

  const grid = document.getElementById('totais-grid');
  grid.textContent = '';
  const cards = [
    [total, 'Total de Alunos', ''],
    [turmas, 'Turmas', 'verde'],
    [etapas, 'Etapas', 'ouro'],
    [masc, 'Masculino', ''],
    [fem, 'Feminino', 'roxo'],
    [nee, 'Com NEE', 'verde'],
    [restric, 'Restrição alimentar', 'ouro'],
    [inicial, 'Matr. Inicial', 'ouro'],
    [rematric, 'Rematrícula', '']
  ];
  cards.forEach(([num, lbl, cls]) => {
    const card = document.createElement('div');
    card.className = 'total-card' + (cls ? ' ' + cls : '');
    const n = document.createElement('div');
    n.className = 'num';
    n.textContent = num;
    const l = document.createElement('div');
    l.className = 'label';
    l.textContent = lbl;
    card.appendChild(n);
    card.appendChild(l);
    grid.appendChild(card);
  });
}

// ── RELATÓRIO POR TURMA ───────────────────────────────────────────────────
function agruparPorTurma(lista){
  const grupos = {};
  lista.forEach(m => {
    const t = getTurma(m) || 'Sem Turma';
    const chave = [m.etapa||'Sem Etapa', m.turno||'Sem Turno', t].join('|');
    if(!grupos[chave]) grupos[chave] = { etapa: m.etapa||'—', turno: m.turno||'—', turma: t, alunos:[] };
    grupos[chave].alunos.push(m);
  });
  return Object.values(grupos).sort((a,b) =>
    (a.etapa+a.turno+a.turma).localeCompare(b.etapa+b.turno+b.turma, 'pt-BR')
  );
}

// Badges via DOM (evita XSS — sem innerHTML com dados do banco)
function criarBadge(texto, cls){
  const span = document.createElement('span');
  span.className = 'badge ' + (cls || '');
  span.textContent = texto;
  return span;
}
function badgeSexoEl(s){
  if(s==='M') return criarBadge('M', 'badge-m');
  if(s==='F') return criarBadge('F', 'badge-f');
  const b = criarBadge('—', '');
  b.style.background = '#f1f5f9'; b.style.color = '#64748b';
  return b;
}
function badgeTipoEl(tipo){
  if(tipo==='Inicial') return criarBadge('Inicial', 'badge-mat');
  if(tipo==='Rematricula') return criarBadge('Rematrícula', 'badge-rema');
  const b = criarBadge('—', ''); b.style.background = '#f1f5f9'; b.style.color = '#64748b';
  return b;
}

function renderRelatorio(){
  const totalFiltrado = matriculasFiltradas.length;
  const usaPagina = totalFiltrado > LIMITE_PAGINACAO;
  const listaRender = usaPagina
    ? matriculasFiltradas.slice((paginaAtual - 1) * PAGINA_TAMANHO, paginaAtual * PAGINA_TAMANHO)
    : matriculasFiltradas;
  const grupos = agruparPorTurma(listaRender);
  const area = document.getElementById('area-relatorio');
  area.textContent = '';

  if(!grupos.length){
    const vazio = document.createElement('div');
    vazio.className = 'vazio';
    const span = document.createElement('span');
    span.textContent = '📋';
    vazio.appendChild(span);
    vazio.appendChild(document.createTextNode('Nenhuma matrícula encontrada com os filtros selecionados.'));
    area.appendChild(vazio);
    return;
  }

  grupos.forEach(g => {
    const masc = g.alunos.filter(a => getSexo(a)==='M').length;
    const fem  = g.alunos.filter(a => getSexo(a)==='F').length;
    const nee  = g.alunos.filter(a => getNEE(a)==='Sim').length;
    const ini  = g.alunos.filter(a => a.tipoMatricula==='Inicial').length;
    const rema = g.alunos.filter(a => a.tipoMatricula==='Rematricula').length;
    const total = g.alunos.length;

    const sec = document.createElement('div');
    sec.className = 'turma-sec';

    const head = document.createElement('div');
    head.className = 'turma-header';
    const h3 = document.createElement('h3');
    h3.textContent = '📚 ' + g.etapa + ' — Turma ' + g.turma;
    head.appendChild(h3);
    const badges = document.createElement('div');
    badges.className = 'turma-badges';
    const t1 = document.createElement('span'); t1.className = 'tbadge'; t1.textContent = '🕐 ' + g.turno; badges.appendChild(t1);
    const t2 = document.createElement('span'); t2.className = 'tbadge'; t2.textContent = '👥 ' + total + ' aluno' + (total!==1?'s':''); badges.appendChild(t2);
    const t3 = document.createElement('span'); t3.className = 'tbadge'; t3.textContent = '♂ ' + masc + ' · ♀ ' + fem; badges.appendChild(t3);
    if(nee > 0){ const t4 = document.createElement('span'); t4.className = 'tbadge'; t4.textContent = '⭐ ' + nee + ' NEE'; badges.appendChild(t4); }
    head.appendChild(badges);
    sec.appendChild(head);

    const table = document.createElement('table');
    const thead = document.createElement('thead');
    const thr = document.createElement('tr');
    ['Nº','Nome do Aluno','Nascimento','Sexo','Tipo','Responsável','Telefone'].forEach((txt,i) => {
      const th = document.createElement('th');
      if(i===0) th.style.width = '52px';
      th.textContent = txt;
      thr.appendChild(th);
    });
    thead.appendChild(thr); table.appendChild(thead);

    const tbody = document.createElement('tbody');
    g.alunos.forEach((a,i) => {
      const tr = document.createElement('tr');
      const nc = document.createElement('td'); nc.className = 'nchamada'; nc.textContent = a.nChamada||String(i+1).padStart(2,'0'); tr.appendChild(nc);

      const tdNome = document.createElement('td'); tdNome.className = 'nome';
      tdNome.textContent = getNome(a) || '—';
      if(getNEE(a)==='Sim'){ const nb = criarBadge('NEE', 'badge-nee'); nb.style.marginLeft = '6px'; tdNome.appendChild(nb); }
      tr.appendChild(tdNome);

      const tdNasc = document.createElement('td'); tdNasc.className = 'sub'; tdNasc.textContent = getNascimento(a) || '—'; tr.appendChild(tdNasc);
      const tdSexo = document.createElement('td'); tdSexo.appendChild(badgeSexoEl(getSexo(a))); tr.appendChild(tdSexo);
      const tdTipo = document.createElement('td'); tdTipo.appendChild(badgeTipoEl(a.tipoMatricula)); tr.appendChild(tdTipo);
      const tdResp = document.createElement('td'); tdResp.className = 'sub'; tdResp.style.fontSize = '.75rem'; tdResp.textContent = (a.responsavel||'—').toString(); tr.appendChild(tdResp);
      const tdTel = document.createElement('td'); tdTel.className = 'sub'; tdTel.style.fontSize = '.75rem'; tdTel.textContent = (a.telResponsavel||'—').toString(); tr.appendChild(tdTel);
      tbody.appendChild(tr);
    });

    const subtr = document.createElement('tr'); subtr.className = 'subtotal-row';
    const st1 = document.createElement('td'); st1.colSpan = 2; st1.textContent = 'TOTAL: ' + total + ' aluno' + (total!==1?'s':''); subtr.appendChild(st1);
    subtr.appendChild(document.createElement('td'));
    const st2 = document.createElement('td'); st2.textContent = masc + 'M / ' + fem + 'F'; subtr.appendChild(st2);
    const st3 = document.createElement('td'); st3.textContent = ini + ' ini · ' + rema + ' rema'; subtr.appendChild(st3);
    const st4 = document.createElement('td'); st4.colSpan = 2; st4.textContent = nee > 0 ? nee + ' com NEE' : ''; subtr.appendChild(st4);
    tbody.appendChild(subtr);

    table.appendChild(tbody);
    sec.appendChild(table);
    area.appendChild(sec);
  });

  if (usaPagina) {
    const totalPaginas = Math.ceil(totalFiltrado / PAGINA_TAMANHO);
    const pagBar = document.createElement('div');
    pagBar.className = 'paginacao-bar';
    pagBar.style.cssText = 'display:flex;align-items:center;gap:14px;margin-top:20px;padding:14px;background:#fff;border-radius:12px;box-shadow:var(--sombra);flex-wrap:wrap';
    const info = document.createElement('span');
    info.style.cssText = 'font-size:.85rem;font-weight:700;color:var(--sub)';
    info.textContent = `Mostrando ${(paginaAtual-1)*PAGINA_TAMANHO + 1}–${Math.min(paginaAtual*PAGINA_TAMANHO, totalFiltrado)} de ${totalFiltrado} (página ${paginaAtual}/${totalPaginas})`;
    pagBar.appendChild(info);
    const btnAnt = document.createElement('button');
    btnAnt.className = 'btn btn-sec'; btnAnt.textContent = '← Anterior';
    btnAnt.disabled = paginaAtual <= 1;
    btnAnt.onclick = () => { if (paginaAtual > 1) { paginaAtual--; renderRelatorio(); } };
    pagBar.appendChild(btnAnt);
    const btnProx = document.createElement('button');
    btnProx.className = 'btn btn-sec'; btnProx.textContent = 'Próxima →';
    btnProx.disabled = paginaAtual >= totalPaginas;
    btnProx.onclick = () => { if (paginaAtual < totalPaginas) { paginaAtual++; renderRelatorio(); } };
    pagBar.appendChild(btnProx);
    area.appendChild(pagBar);
  }
}

// ── IMPRIMIR (padrão municipal: apenas #doc) ─────────────────────────────────
function imprimirRelatorioMatriculas() {
  const areaTotais = document.getElementById('area-totais');
  const areaRelatorio = document.getElementById('area-relatorio');
  if (!areaTotais && !areaRelatorio) return;
  if (!window.InstitucionalLayout || typeof window.InstitucionalLayout.render !== 'function') {
    window.print();
    return;
  }
  const { body } = window.InstitucionalLayout.render({
    titulo: 'Relatório de Matrículas por Turma',
    orientacao: 'landscape'
  });
  if (body) {
    body.textContent = '';
    if (areaTotais) body.appendChild(areaTotais.cloneNode(true));
    if (areaRelatorio) body.appendChild(areaRelatorio.cloneNode(true));
  }
  window.InstitucionalLayout.preparePrint();
}

// ── GERAR PDF ─────────────────────────────────────────────────────────────
async function gerarPDF(){
  const btn = document.getElementById('btn-pdf');
  btn.disabled = true;
  btn.textContent = '⏳ Gerando...';

  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
    const W = doc.internal.pageSize.getWidth();
    let y = 0;

    const dataHoje = new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
    const grupos   = agruparPorTurma(matriculasFiltradas);
    const total    = matriculasFiltradas.length;
    const masc     = matriculasFiltradas.filter(m => getSexo(m)==='M').length;
    const fem      = matriculasFiltradas.filter(m => getSexo(m)==='F').length;
    const nee      = matriculasFiltradas.filter(m => getNEE(m)==='Sim').length;

    function addCabecalho(){
      // Fundo azul
      doc.setFillColor(21,101,192);
      doc.rect(0,0,W,32,'F');
      // Título
      doc.setTextColor(255,255,255);
      doc.setFont('helvetica','bold');
      doc.setFontSize(13);
      doc.text('RELATÓRIO DE MATRÍCULAS POR TURMA', W/2, 10, {align:'center'});
      doc.setFontSize(9);
      doc.setFont('helvetica','normal');
      doc.text('E. M. Getúlio Vargas — Nova Ubiratã/MT', W/2, 17, {align:'center'});
      doc.text('Gerado em: ' + dataHoje, W/2, 23, {align:'center'});
      // Filtros aplicados
      const ano   = document.getElementById('fil-ano').value;
      const turno = document.getElementById('fil-turno').value;
      const etapa = document.getElementById('fil-etapa').value;
      const filtroStr = [ano&&('Ano: '+ano), turno&&('Turno: '+turno), etapa&&('Etapa: '+etapa)].filter(Boolean).join(' · ') || 'Sem filtros adicionais';
      doc.text(filtroStr, W/2, 29, {align:'center'});
      y = 38;
    }

    function addRodape(){
      const pg = doc.internal.getCurrentPageInfo().pageNumber;
      const total = doc.internal.getNumberOfPages();
      doc.setFillColor(240,244,249);
      doc.rect(0, 285, W, 12, 'F');
      doc.setTextColor(90,104,128);
      doc.setFontSize(7);
      doc.setFont('helvetica','normal');
      doc.text('E. M. Getúlio Vargas · Relatório gerado em ' + dataHoje, 14, 292);
      doc.text('Página ' + pg + ' de ' + total, W-14, 292, {align:'right'});
    }

    // ── CAPA / RESUMO ────────────────────────────────────────────────────
    addCabecalho();

    // Resumo geral
    doc.setFillColor(219,238,255);
    doc.roundedRect(14, y, W-28, 36, 4, 4, 'F');
    doc.setTextColor(13,71,161);
    doc.setFont('helvetica','bold');
    doc.setFontSize(10);
    doc.text('RESUMO GERAL', 22, y+8);
    doc.setFont('helvetica','normal');
    doc.setFontSize(9);
    doc.setTextColor(21,101,192);

    const cols = [
      ['Total de Alunos', total],
      ['Turmas', grupos.length],
      ['Masculino', masc],
      ['Feminino', fem],
      ['Com NEE', nee],
      ['Mat. Inicial', matriculasFiltradas.filter(m=>m.tipoMatricula==='Inicial').length],
      ['Rematrícula', matriculasFiltradas.filter(m=>m.tipoMatricula==='Rematricula').length],
    ];

    const cw = (W-28) / 4;
    cols.forEach((c,i) => {
      const col = i % 4;
      const row = Math.floor(i / 4);
      const cx = 22 + col * cw;
      const cy = y + 16 + row * 14;
      doc.setFont('helvetica','bold');
      doc.setFontSize(14);
      doc.setTextColor(21,101,192);
      doc.text(String(c[1]), cx, cy);
      doc.setFont('helvetica','normal');
      doc.setFontSize(7.5);
      doc.setTextColor(90,104,128);
      doc.text(c[0], cx, cy+5);
    });

    y += 44;

    // Tabela resumo por turma
    const resumoRows = grupos.map(g => [
      g.etapa,
      g.turno,
      g.turma,
      g.alunos.length,
      g.alunos.filter(a=>getSexo(a)==='M').length,
      g.alunos.filter(a=>getSexo(a)==='F').length,
      g.alunos.filter(a=>getNEE(a)==='Sim').length,
    ]);

    doc.autoTable({
      startY: y,
      head: [['Etapa','Turno','Turma','Total','Masc.','Fem.','NEE']],
      body: resumoRows,
      foot: [['TOTAL','','', total, masc, fem, nee]],
      theme: 'grid',
      headStyles: { fillColor:[21,101,192], textColor:255, fontStyle:'bold', fontSize:8 },
      footStyles: { fillColor:[219,238,255], textColor:[13,71,161], fontStyle:'bold', fontSize:8 },
      bodyStyles: { fontSize:8, textColor:[15,25,35] },
      alternateRowStyles: { fillColor:[247,250,255] },
      columnStyles:{
        0:{cellWidth:50}, 1:{cellWidth:28}, 2:{cellWidth:20},
        3:{halign:'center'}, 4:{halign:'center'}, 5:{halign:'center'}, 6:{halign:'center'}
      },
      margin:{left:14, right:14},
      didDrawPage: addRodape
    });

    // ── PÁGINAS POR TURMA ────────────────────────────────────────────────
    grupos.forEach(g => {
      doc.addPage();
      addCabecalho();

      // Cabeçalho da turma
      doc.setFillColor(21,101,192);
      doc.roundedRect(14, y, W-28, 14, 3, 3, 'F');
      doc.setTextColor(255,255,255);
      doc.setFont('helvetica','bold');
      doc.setFontSize(10);
      doc.text(`${g.etapa} — Turma ${g.turma} · ${g.turno}`, W/2, y+9, {align:'center'});
      y += 20;

      const linhas = g.alunos.map((a,i) => [
        a.nChamada || String(i+1).padStart(2,'0'),
        getNome(a) || '—',
        getNascimento(a) || '—',
        getSexo(a) === 'M' ? 'Masc.' : getSexo(a) === 'F' ? 'Fem.' : '—',
        a.tipoMatricula === 'Inicial' ? 'Inicial' : a.tipoMatricula === 'Rematricula' ? 'Rematríc.' : '—',
        getNEE(a) === 'Sim' ? 'Sim' : '—',
        a.responsavel || '—',
        a.telResponsavel || '—',
      ]);

      const masc = g.alunos.filter(a=>getSexo(a)==='M').length;
      const fem  = g.alunos.filter(a=>getSexo(a)==='F').length;
      const neeT = g.alunos.filter(a=>getNEE(a)==='Sim').length;
      const ini  = g.alunos.filter(a=>a.tipoMatricula==='Inicial').length;
      const rema = g.alunos.filter(a=>a.tipoMatricula==='Rematricula').length;

      doc.autoTable({
        startY: y,
        head: [['Nº','Nome do Aluno','Nascimento','Sexo','Tipo','NEE','Responsável','Telefone']],
        body: linhas,
        foot: [[
          '','TOTAL: '+g.alunos.length+' alunos','',
          masc+'M / '+fem+'F',
          ini+' ini · '+rema+' rema',
          neeT > 0 ? neeT+' NEE' : '—','',''
        ]],
        theme: 'striped',
        headStyles: { fillColor:[21,101,192], textColor:255, fontStyle:'bold', fontSize:7.5 },
        footStyles: { fillColor:[219,238,255], textColor:[13,71,161], fontStyle:'bold', fontSize:7.5 },
        bodyStyles: { fontSize:8, textColor:[15,25,35] },
        columnStyles:{
          0:{cellWidth:10, halign:'center'},
          1:{cellWidth:46},
          2:{cellWidth:22},
          3:{cellWidth:14, halign:'center'},
          4:{cellWidth:20, halign:'center'},
          5:{cellWidth:10, halign:'center'},
          6:{cellWidth:38},
          7:{cellWidth:24},
        },
        margin:{left:14, right:14},
        didDrawPage: addRodape
      });

      y = doc.lastAutoTable.finalY + 8;
    });

    // Adiciona rodapé em todas as páginas
    const totalPgs = doc.internal.getNumberOfPages();
    for(let i=1; i<=totalPgs; i++){
      doc.setPage(i);
      addRodape();
    }

    const nomeArq = `matriculas_${new Date().toISOString().slice(0,10)}.pdf`;
    doc.save(nomeArq);

  } catch(e){
    console.error('PDF erro:', e);
    alert('Erro ao gerar PDF: ' + e.message);
  }

  btn.disabled = false;
  btn.textContent = '⬇ Baixar PDF';
}
</script>
